name: Release Desktop

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Windows x64 Setup
    runs-on: windows-latest

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust builds
        uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build desktop package
        run: cargo tauri build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: transcript-windows-x64-setup
          path: target/release/bundle/nsis/*_x64-setup.exe
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        shell: bash
        run: find release-assets -type f -maxdepth 5 -print

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Transcript ${{ github.ref_name }}
          files: release-assets/**/*_x64-setup.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
