name: Release Desktop

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows
            os: windows-latest
            artifact_name: transcript-windows
            artifact_path: |
              target/release/bundle/msi/*.msi
              target/release/bundle/nsis/*setup.exe
          - label: linux
            os: ubuntu-22.04
            artifact_name: transcript-linux
            artifact_path: |
              target/release/bundle/appimage/*.AppImage
              target/release/bundle/deb/*.deb
              target/release/bundle/rpm/*.rpm
          - label: macos
            os: macos-latest
            artifact_name: transcript-macos
            artifact_path: |
              target/release/bundle/dmg/*.dmg

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust builds
        uses: swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            librsvg2-dev \
            pkg-config \
            wget

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build desktop package
        run: cargo tauri build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        shell: bash
        run: find release-assets -type f -maxdepth 5 -print

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Transcript ${{ github.ref_name }}
          files: release-assets/**/*
          fail_on_unmatched_files: true
          generate_release_notes: true
