# Builds, verifies, packages, and publishes tagged Windows releases.
name: Release desktop app

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tagged version
        shell: pwsh
        run: |
          $tagVersion = '${{ github.ref_name }}' -replace '^v', ''
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($tagVersion -ne $packageVersion) {
            throw "Tag version $tagVersion does not match package version $packageVersion."
          }

      - name: Verify source
        run: |
          npm run typecheck
          npm run lint
          npm test
          npm run format:check

      - name: Build Windows x64 and arm64 setup
        run: npm run package:win

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Transcript ${{ github.ref_name }}
          files: |
            release/transcript-*-windows-x64-setup.exe
            release/transcript-*-windows-arm64-setup.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false
          prerelease: false
          make_latest: true
