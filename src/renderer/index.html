<!-- Hosts the sandboxed React renderer with a restrictive content security policy. -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws://localhost:*; media-src 'self' blob:; worker-src 'self' blob:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>Transcript</title>
  </head>
  <body theme-mode="dark">
    <div id="root"></div>
    <script type="module" src="/src/entryPoint.tsx"></script>
  </body>
</html>
